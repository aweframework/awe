# Hot-reload profile: relax static resource handling so a rebuilt webpack bundle
# is served immediately, without a server restart. Production caching stays in
# application.properties; these overrides only apply under the "hot-reload"
# Spring profile (activated by `npm run start:hot-reload`).
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.web.resources.chain.strategy.content.enabled=false

# spring-boot-devtools: don't restart the JVM when application XML descriptors
# change (they are reloaded by the framework, not the classloader).
spring.devtools.restart.additional-exclude=application/**
