# Hot-reload profile — fluid front-end iteration.
#
# The easiest way to use it is `npm run start:hot-reload` (runs webpack in watch mode
# and the app with this profile). To run the app by hand:
#   mvn spring-boot:run -Phot-reload -Dspring-boot.run.profiles=hot-reload
#   (or add `hot-reload` to spring.profiles.active)
#
# What it buys you: rebuilt front-end bundles are served immediately, without a full
# JVM restart, so the edit -> reload loop is ~1s instead of ~15s. Pair it with
# `npm run build:watch` (webpack rebuilds bundles incrementally on save).
#
# The main application.properties keeps production-safe caching/hashing; this profile
# only relaxes it for local development.
#
# NOTE on XML: screen/locale/menu/query XML are loaded into the Spring context at
# startup, so editing them still needs a context reload (a spring-boot-devtools
# restart, triggered when the compiled resource under target/classes changes). Do NOT
# set awe.application.preload-screens=false to try to hot-reload screens: the
# per-request screen read does not resolve screens placed in subdirectories.

# Serve rebuilt specific.js / specific.css immediately: no content-hash, no caching.
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.web.resources.chain.strategy.content.enabled=false
