<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:utext="${title} ?: 'Oops! Something went wrong'">Oops! Something went wrong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .error-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            transition: all 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
        }

        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 16px;
            transition: color 0.3s ease;
        }

        .error-message {
            font-size: 16px;
            color: #718096;
            line-height: 1.6;
            margin-bottom: 32px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #ff6b6b;
            transition: all 0.3s ease;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }

        /* Dark Mode Styles */
        .layout-dark body {
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
        }

        .layout-dark .error-container {
            background: #2d3748;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid #4a5568;
        }

        .layout-dark .error-icon {
            background: linear-gradient(135deg, #fc8181, #f56565);
        }

        .layout-dark .error-title {
            color: #f7fafc;
        }

        .layout-dark .error-message {
            background: #1a202c;
            color: #cbd5e0;
            border-left: 4px solid #fc8181;
        }

        .layout-dark .error-message strong {
            color: #e2e8f0;
        }

        .layout-dark .btn-primary {
            background: linear-gradient(135deg, #4c51bf, #553c9a);
        }

        .layout-dark .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(76, 81, 191, 0.4);
        }

        .layout-dark .btn-secondary {
            background: #4a5568;
            color: #e2e8f0;
        }

        .layout-dark .btn-secondary:hover {
            background: #718096;
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 24px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon" th:utext="${icon} ?: '⚠'">⚠</div>
        <h1 class="error-title" th:utext="${title} ?: 'Oops! Something went wrong'">Oops! Something went wrong</h1>
        <div class="error-message">
            <strong th:utext="${messagePrefix} ?: 'Unable to complete the process:'">Unable to complete the process:</strong><br>
            <span th:utext="${message} ?: 'An unexpected error occurred. Please try again later.'">An unexpected error occurred. Please try again later.</span>
        </div>
        <div class="error-actions">
            <button class="btn btn-primary" onclick="window.history.back()" th:utext="${backButtonText} ?: 'Go Back'">Go Back</button>
            <button class="btn btn-secondary" th:data-home-url="${homeUrl} ?: '/'" onclick="window.location.href=this.getAttribute('data-home-url')" th:utext="${homeButtonText} ?: 'Home'">Home</button>
        </div>
    </div>
</body>
</html>
