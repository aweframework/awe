# awe-boot properties for testing ldap authentication provider
spring.datasource.platform=hsqldb
spring.datasource.url=jdbc:hsqldb:file:target/tests/db/awe-test
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.datasource.continue-on-error=true
spring.datasource.data=classpath:sql/testdata-hsqldb.sql
spring.datasource.schema=classpath:sql/schema-hsqldb.sql

# Authentication mode (ldap | bbdd | in_memory | custom)
awe.security.auth-mode=ldap
# Ldap user filter
awe.security.auth.ldap.user-filter=uid={0}
# Ldap urls (ldap:// or ldaps://)
awe.security.auth.ldap.url=ldap://localhost:389
# Ldap user bind
awe.security.auth.ldap.user-bind=appfxclear
# Ldap password bind
awe.security.auth.ldap.password-bind=ENC(cI0mDnxZCFAw89zIDSQ5Q1vMphre0ootXg4Izv11DF8==)