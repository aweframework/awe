################################################
# Tests Config File
# Configurates
################################################

## APPLICATION #################################
server.address=localhost
server.port=8080
server.servlet.context-path=/

## SELENIUM ####################################
# URL
selenium.start.url=http://${server.address}:${server.port}${server.servlet.context-path}
# Timeout
failsafe.timeout=60
# Browser: firefox, chrome, headless-firefox, headless-chrome, (x) opera, (x) edge, ie [NOTE: (x) currently not working]
#failsafe.browser=chrome

# Browser resolution to test with. Leave empty for default resolution
browser.resolution.width=1280
browser.resolution.height=1024

# Path to leave screenshots
screenshot.path=target/tests/selenium/screenshots/
show.mouse=true

#test.browser=chrome
test.browser-width=1280
test.browser-height=1024
test.screenshot-path=target/tests/selenium/screenshots/
test.video-format=.webm
test.video-save=FAILED

# URL
test.server-host=localhost
test.server-port=8080
test.context-path=/
test.start-url=http://${test.server-host}:${test.server-port}${test.context-path}
test.timeout=60
test.show-mouse=true

# Browser and recorder services
test.browser-host=browser
test.browser-display=99
test.browser-port=4444
test.recorder-url=http://recorder:3000