# H2 properties
spring.datasource.platform=h2
spring.datasource.url=jdbc:h2:mem:awe-test;NON_KEYWORDS=value,user,day,year,month,hour,minute,second
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.schema-locations=classpath:sql/schema-h2.sql
spring.sql.init.data-locations=classpath:sql/testdata-h2.sql
spring.sql.init.continue-on-error=false
spring.sql.init.mode=always
spring.datasource.validation-query=select 1 from dual
spring.datasource.hikari.minimumIdle=10
spring.datasource.hikari.maximumPoolSize=10
application.parameter.preload.screens=false
