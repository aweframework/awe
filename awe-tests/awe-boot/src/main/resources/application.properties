# Application configuration
spring.application.name=awe-boot
application.name=${project.artifactId}
application.acronym=${project.artifactId}
application.base.path=${user.home}/${project.artifactId}
filemanager.base.path=${application.base.path}

##############################################################
# Logs properties
##############################################################
# File with properties for configuring the log manager
application.log.file.path=${application.log.base.path}/java/
# File pattern for rolling
application.log.file-pattern=_%d{yyyy-MM-dd}-%i
# Pattern layout
application.log.layout-pattern=%style{%d{ISO8601}}{white} %highlight{%-5level }[%style{%t}{bright,blue}] %style{%c{1.}}{bright,yellow}: %msg%n%throwable
# Charset
application.log.charset=UTF-8
# Size rolling policy
application.log.size-rolling=10 MB
# Date rolling policy (Number days)
application.log.date-rolling=1
# Max number files rolling backup
application.log.num-file-rolling=10
# Delete files if size exceeds more than this number
application.log.delete-if-size-exceeds=500 MB
# Delete files if days exceeds more than this number
application.log.delete-if-days-exceeds=15d
# Scheduler execution path
scheduler.execution.log.path=${application.log.base.path}/scheduler/
# Log execution layout
scheduler.log.layout-pattern=[%-5level] %d{dd/MM/yyyy HH:mm:ss.SSS} - %c{1.}: %msg%n%throwable

# Profile
spring.profiles.active=local
logging.level.org.springframework.web=INFO

# Server configuration
server.servlet.context-path=/
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=256
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# SPRING RESOURCES HANDLING (ResourceProperties)
spring.web.resources.add-mappings=true
spring.web.resources.cache.period=31557600
spring.web.resources.chain.cache=true
spring.web.resources.chain.compressed=true
spring.web.resources.chain.strategy.content.enabled=true
# Enable database update by Flyway
spring.flyway.enabled=true
awe.database.migration.modules=AWE,SCHEDULER,NOTIFIER,AWE-BOOT
################################################
# Database configuration
################################################
## Database HSQL
spring.datasource.url=jdbc:hsqldb:file:target/db/awe-boot
spring.datasource.username=sa
spring.datasource.password=

################################################
# Cache
################################################
spring.cache.type=jcache
spring.cache.jcache.config=classpath:ehcache.xml
# Redis server host.
spring.redis.host=localhost
# Login password of the redis server.
spring.redis.password=
# Redis server port.
spring.redis.port=6379

################################################
# Open API configuration
################################################
awe.rest.enabled=true
awe.rest.version=v1.0.1
awe.rest.contact-name=AWE
awe.rest.contact-email=info@almis.com
awe.rest.contact-url=https://aweframework.com
awe.rest.terms-of-service-url=https://gitlab.com/aweframework/awe/-/blob/master/LICENSE.md
awe.rest.external-doc-description=AWE Framework Wiki Documentation
awe.rest.external-doc-url=https://docs.aweframework.com/docs/
################################################
# Session configuration
################################################
spring.session.store-type=none

################################################
# Email
################################################
awe.mail.enabled=true
# Mail authorization
awe.mail.auth=false
# Mail host
awe.mail.host=almeml1.almis.local
# Mail port
awe.mail.port=25
# Mail user
awe.mail.user=
# Mail password
awe.mail.pass=
# Mail debug
awe.mail.debug=true
# Mail SSL
awe.mail.ssl=true
# Mail TLS
awe.mail.tls=true
# Mail localhost
awe.mail.localhost=localhost

################################################
# Actuator management
################################################
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.ldap.enabled=false
management.health.redis.enabled=false

################################################
# Metrics management
################################################
wavefront.application.name=console-awe-boot
management.metrics.export.wavefront.enabled=false
management.metrics.export.wavefront.step=60s
management.metrics.export.wavefront.source=awe-cloud-server
spring.sleuth.async.enabled=false
#---
spring.config.activate.on-profile=dev
spring.cache.type=simple
#---
spring.config.activate.on-profile=cloud
spring.cache.type=redis
spring.session.store-type=redis
management.health.redis.enabled=true
# Redis server host.
spring.redis.host=redis-service
# Login password of the redis server.
spring.redis.password=
# Redis server port.
spring.redis.port=6379