# Hot-reload profile — XML hot reload (development only).
#
# Activated together with the Maven `hot-reload` profile: `npm run start:hot-reload`
# runs `mvn spring-boot:run -Phot-reload`, and that Maven profile adds `hot-reload`
# to the Spring profiles through the spring-boot-maven-plugin configuration.
#
# Edit any XML definition under src/main/resources (queries, maintains, services,
# enumerated, queues, emails, actions, profiles, screens, locales, menus) and it is
# copied to the exploded classpath and reloaded in place: no JVM restart, just
# refresh the browser.

# Static-resource caching/hashing is already relaxed in the main application.properties
# (awe-boot is a development/test harness), so this profile only enables XML hot reload.
# Serve rebuilt specific.js / specific.css immediately: no content-hash, no caching.
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.web.resources.chain.strategy.content.enabled=false
awe.application.xml-hot-reload=true
awe.application.xml-hot-reload-sources=src/main/resources

# Keep spring-boot-devtools from restarting the context when the synchronized XML
# under target/classes changes (additional-exclude KEEPS the devtools defaults).
spring.devtools.restart.additional-exclude=application/**
